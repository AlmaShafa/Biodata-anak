<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Database Biodata Anak</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        header { background: var(--primary); color: white; padding: 1rem 2rem; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; padding: 20px; border: 2px dashed #ccc; border-radius: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-pdf { background: #e74c3c; color: white; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--secondary); color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .child-photo { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid var(--accent); }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .album-card { text-align: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; }
        .tab-btn.active { background: var(--accent); color: white; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

<header>
    <h1>Database Biodata Anak & Management Album</h1>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('data-table')">Data & PDF</button>
        <button class="tab-btn" onclick="showTab('album')">Album Foto</button>
    </div>

    <!-- Section Upload -->
    <div class="upload-section">
        <div>
            <h3>1. Upload Data (Excel)</h3>
            <input type="file" id="excelInput" accept=".xlsx, .xls">
            <p style="font-size: 0.8rem; color: #666;">*Gunakan header sesuai field biodata</p>
        </div>
        <div>
            <h3>2. Upload Foto Anak</h3>
            <input type="file" id="photoInput" accept="image/*" multiple>
            <p style="font-size: 0.8rem; color: #666;">*Nama file foto harus sama dengan Nama Lengkap anak</p>
        </div>
    </div>

    <!-- Section Tabel -->
    <div id="data-table" class="content-section active">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Daftar Biodata (Kapasitas: 2000+)</h3>
            <button class="btn btn-primary" onclick="exportFullTablePDF()">Download Semua PDF</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>ID</th>
                        <th>Nama Lengkap</th>
                        <th>L/P</th>
                        <th>Kota</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Section Album -->
    <div id="album" class="content-section">
        <h3>Album Foto Anak</h3>
        <div class="album-grid" id="albumGrid"></div>
    </div>
</div>

<script>
    let childrenData = [];
    let photoDatabase = {};

    // Menangani Tabs
    function showTab(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Handle Excel Upload
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            childrenData = XLSX.utils.sheet_to_json(ws);
            renderData();
        };
        reader.readAsBinaryString(e.target.files[0]);
    });

    // Handle Photo Upload
    document.getElementById('photoInput').addEventListener('change', function(e) {
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const name = file.name.split('.')[0]; // Nama file tanpa ekstensi
                photoDatabase[name] = event.target.result;
                renderData();
                renderAlbum();
            };
            reader.readAsDataURL(file);
        }
    });

    function renderData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        childrenData.forEach((child, index) => {
            const photoUrl = photoDatabase[child['Nama Lengkap']] || 'https://via.placeholder.com/60';
            const row = `
                <tr>
                    <td><img src="${photoUrl}" class="child-photo"></td>
                    <td>${child['رقم مكفول'] || index+1}</td>
                    <td>${child['Nama Lengkap'] || '-'}</td>
                    <td>${child['Jenis Kelamin'] || '-'}</td>
                    <td>${child['Kota'] || '-'}</td>
                    <td>
                        <button class="btn btn-pdf" onclick="generateSinglePDF(${index})">Preview PDF</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function renderAlbum() {
        const grid = document.getElementById('albumGrid');
        grid.innerHTML = '';
        childrenData.forEach(child => {
            const name = child['Nama Lengkap'];
            if(photoDatabase[name]) {
                grid.innerHTML += `
                    <div class="album-card">
                        <img src="${photoDatabase[name]}" style="width:100%; border-radius:5px;">
                        <p><strong>${name}</strong></p>
                    </div>
                `;
            }
        });
    }

    // Fungsi Generate PDF Sempurna
    async function generateSinglePDF(index) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = childrenData[index];
        const photo = photoDatabase[data['Nama Lengkap']];

        // Header
        doc.setFontSize(18);
        doc.text("BIODATA ANAK / بيانات الطفل", 105, 20, { align: 'center' });

        // Tambah Foto jika ada
        if (photo) {
            doc.addImage(photo, 'JPEG', 160, 30, 35, 45);
        }

        const tableBody = [
            [{ content: '1. البيانات التعريفية والشخصية (Identitas Diri)', colSpan: 2, styles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' } }],
            ['رقم مكفول (ID)', data['رقم مكفول'] || '-'],
            ['اسم المكفول / Nama Lengkap', data['Nama Lengkap'] || '-'],
            ['الجنس / Jenis Kelamin', data['Jenis Kelamin'] || '-'],
            ['مكان الميلاد / Tempat Lahir', data['Tempat Lahir'] || '-'],
            ['تاريخ الميلاد / Tanggal Lahir', data['Tanggal Lahir'] || '-'],
            ['الحالة الصحية / Kesehatan', data['Kesehatan Yatim'] || '-'],
            
            [{ content: '2. العنوان والسكن (Alamat)', colSpan: 2, styles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' } }],
            ['المدينة / Kota', data['Kota'] || '-'],
            ['العنوان الحالي / Alamat', data['Alamat Saat Ini'] || '-'],
            ['حالة مكان السكن / Status Tinggal', data['Status Tempat Tinggal'] || '-'],
            ['حالة المنزل / Kondisi Rumah', data['Kondisi Rumah'] || '-'],

            [{ content: '3. الحالة العائلية (Keluarga)', colSpan: 2, styles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' } }],
            ['اسم الأب / Nama Ayah', data['Nama Ayah'] || '-'],
            ['اسم الأم / Nama Ibu', data['Nama Ibu / Wali'] || '-'],
            ['عدد أفراد الأسرة / Jml Keluarga', data['Jumlah Anggota Keluarga'] || '-'],
            
            [{ content: '4. المسار التعليمي (Pendidikan)', colSpan: 2, styles: { fillColor: [52, 152, 219], textColor: 255, fontStyle: 'bold' } }],
            ['المستوى التعليمي / Jenjang', data['Jenjang Pendidikan'] || '-'],
            ['اسم المدرسة / Sekolah', data['Nama Sekolah'] || '-'],
            ['الصف / Kelas', data['Kelas'] || '-'],

            [{ content: '5. التقييم النهائي (Rekomendasi)', colSpan: 2, styles: { fillColor: [46, 204, 113], textColor: 255 } }],
            ['توصية المكتب / Rekomendasi', data['توصية المكتب'] || '-']
        ];

        doc.autoTable({
            startY: 30,
            margin: { right: 55 }, // Memberi ruang untuk foto di kanan
            body: tableBody,
            theme: 'grid',
            styles: { font: 'helvetica', fontSize: 10 },
            columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' } }
        });

        window.open(doc.output('bloburl'), '_blank');
    }
</script>

</body>
</html>
