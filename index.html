<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Database Anak Online (Firebase)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-online { color: green; font-weight: bold; margin-bottom: 15px; display: block; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; background: #fff; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .loading { display: none; color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Biodata Anak (Online Sync)</h2>
    <span class="status-online">● Terhubung ke Cloud Database</span>

    <div style="background: #e9ecef; padding: 15px; border-radius: 8px;">
        <strong>Panel Admin:</strong><br><br>
        1. Upload Excel: <input type="file" id="excelInput"><br><br>
        2. Upload Foto: <input type="file" id="photoInput" multiple>
        <p id="progressText" class="loading">Sedang mengunggah ke awan...</p>
    </div>

    <div class="card-grid" id="dataDisplay">
        <!-- Data dari Firebase akan muncul di sini -->
    </div>
</div>

<script>
    // MASUKKAN CONFIG FIREBASE ANDA DI SINI
    const firebaseConfig = {
  apiKey: "AIzaSyB58h8StLIIcJ-nU_vbF2D2FiJEeE1dpUA",
  authDomain: "data-kafalah.firebaseapp.com",
  projectId: "data-kafalah",
  storageBucket: "data-kafalah.firebasestorage.app",
  messagingSenderId: "30933873639",
  appId: "1:30933873639:web:0bdbe53011dd58dc6e4342",
  measurementId: "G-9TSK2QYBPV"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 1. Fungsi Baca & Simpan Excel ke Online Firestore
    document.getElementById('excelInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            document.getElementById('progressText').style.display = 'block';
            
            for(let item of json) {
                const nama = item['Nama Lengkap'];
                await db.collection("anak").doc(nama).set({
                    ...item,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }
            alert("Data Excel berhasil disinkronkan ke Cloud!");
            document.getElementById('progressText').style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    });

    // 2. Fungsi Upload Foto ke Cloud Storage
    document.getElementById('photoInput').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        document.getElementById('progressText').style.display = 'block';

        for(let file of files) {
            const namaAnak = file.name.split('.')[0];
            const storageRef = storage.ref(`foto_anak/${file.name}`);
            
            // Upload file
            await storageRef.put(file);
            // Ambil URL-nya
            const downloadURL = await storageRef.getDownloadURL();
            
            // Update link foto di database Firestore
            await db.collection("anak").doc(namaAnak).update({
                fotoUrl: downloadURL
            });
        }
        alert("Semua foto berhasil terupload!");
        document.getElementById('progressText').style.display = 'none';
    });

    // 3. Realtime Listener (Data otomatis update tanpa refresh)
    db.collection("anak").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
        const display = document.getElementById('dataDisplay');
        display.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            display.innerHTML += `
                <div class="card">
                    <img src="${data.fotoUrl || 'https://via.placeholder.com/150'}">
                    <h4>${doc.id}</h4>
                    <p>${data['Kota'] || '-'}</p>
                </div>
            `;
        });
    });
</script>

</body>
</html>
